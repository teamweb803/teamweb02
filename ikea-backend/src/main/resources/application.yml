server:
  port: 8402
spring:
  profiles:
    include: local
  datasource:
    url: jdbc:postgresql://localhost:5440/ikea
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
#  spring:
#    servlet:
#      multipart:
#        max-file-size: 10MB
#        max-request-size: 20MB
jwt:
  secret: ${JWT_SECRET}