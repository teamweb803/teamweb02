server:
  port: 8402
spring:
  profiles:
    include: local
  datasource:
    url: jdbc:postgresql://localhost:5440/ikea
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY}
    client-key: ${TOSS_CLIENT_KEY}
    base-url: https://api.tosspayments.com/v1
  kakao:
    admin-key: ${KAKAO_ADMIN_KEY}
    base-url: https://kapi.kakao.com/v1/payment
#  spring:
#    servlet:
#      multipart:
#        max-file-size: 10MB
#        max-request-size: 20MB
jwt:
  secret: ${JWT_SECRET}